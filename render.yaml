services:
  - type: web
    name: chvaluegrowth-api
    env: docker
    dockerfilePath: Dockerfile
    region: Oregon
    plan: free
    
    # Variables de entorno (puedes editarlas en el dashboard de Render)
    envVars:
      - key: PYTHONDONTWRITEBYTECODE
        value: "1"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: MOCK_MODE
        value: "true"
      - key: DATABASE_URL
        value: "sqlite:///chvaluegrowth.db"
      - key: PORT
        value: "8000"
    
    # Configuración de health check
    healthCheckPath: /health
    
    # Build command (si es necesario)
    # buildCommand: pip install -r requirements.txt
    
    # Startup command (sobrescribe el CMD del Dockerfile)
    # startCommand: uvicorn services.api.main:app --host 0.0.0.0 --port $PORT